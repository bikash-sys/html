<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workshop Registration</title>
</head>
<body>
    <h1>Workshop Registration</h1>
    <h2>Student Registration Form</h2>
    <form action="#" method="post">
        <div>
            <label for="studentName">Student Name:</label>
            <input type="text" id="studentName" name="studentName" required>
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" min="0" required>
        </div>
        <div>
            <span>Gender:</span>
            <input type="radio" id="male" name="gender" value="Male" required>
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="Female">
            <label for="female">Female</label>
            <input type="radio" id="other" name="gender" value="Other">
            <label for="other">Other</label>
        </div>
        <div>
            <span>Courses:</span>
            <input type="checkbox" id="webDev" name="courses" value="Web Development">
            <label for="webDev">Web Development</label>
            <input type="checkbox" id="ai" name="courses" value="AI">
            <label for="ai">AI</label>
            <input type="checkbox" id="networking" name="courses" value="Networking">
            <label for="networking">Networking</label>
        </div>
        <div>
            <button type="submit">Submit</button>
        </div>
    </form>

    <h2>Registered Students</h2>
    <table border="1" cellspacing="0" cellpadding="5">
        <caption><strong>Registered Students</strong></caption>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Courses</th>
            </tr>
        </thead>

        </tbody>
    </table>
</body>
</html>
